strategy_id: tx1.rolling_score
name: 天眼TX1横截面选股策略
family: cross_sectional_stock_selection
benchmark: 000300.XSHG
instrument: A股大中盘流动性股票池
status: research
entrypoint: strategies/rolling_score/strategy.py
rolling_score_start_date: "2019-02-01"
hypothesis: 横截面动量、波动率、反转、流动性与换手稳定性的组合，能够在A股大中盘股票池中产生更稳健的相对沪深300超额收益。
artifact_line_id: combo_b25_h45
signal_inputs:
  - mom_40d
  - volatility_20d
  - reversal_5d
  - amihud_20d
  - turnover_stability_20d
positioning_rule: Top25买入、Top45持有、跌出Top45退出，equal-weight + 持仓延续加分 + 月度重平衡（20交易日）。
risk_controls:
  - single_stock_cap
  - turnover_threshold (50%)
  - min_rebalance_interval (15个交易日)
  - min_trade_value (15000元)
  - tradability_filter
  - holding_bonus
rebalance_frequency: monthly (最小间隔15个交易日)
expected_good_regimes:
  - 横截面分化明显的震荡市
  - 动量因子有效的趋势市
expected_bad_regimes:
  - 全面普涨或普跌的单边市
  - 动量反转剧烈的急转市
notes:
  - 当前默认 baseline 为 baseline_5f（5 因子）+ rank label + Top25/Top45 月度调仓
  - 2026-04-05 组合层迭代将默认 artifact line 提升为 combo_b25_h45，rolling-score 全量得分 50.5
  - benchmark冻结在strategy_id + artifact_line级别，profile不允许改动
