labels:
  return_horizons: [5, 10, 20]
  stability_horizon: 20
  volatility_horizons: [10]
  winsorize_quantiles: [0.01, 0.99]
  relative_return:
    enabled: true
    group_columns: [universe_layer]
    min_group_count: 2
    fallback: date
  trading_days_per_year: 244
  entry_lag_days: 1
splitter:
  kind: walk_forward
  train_end: auto
  val_months: 1
  test_months: 1
  embargo_days: 20
  n_folds: 6
  step_months: 1
model:
  registry: default
  kind: lgbm_multi_target
  feature_set: ax1_unified_v1
  include_scopes: [common, etf_zscore, regime]
  training_horizons: [5, 10, 20]
  risk_horizon: 10
  stability_horizon: 20
  liquidity_column: feature_dollar_volume
  confidence_method: sign_consistency
  params:
    objective: regression
    metric: mae
    boosting_type: gbdt
    n_estimators: 150
    num_leaves: 12
    max_depth: 4
    learning_rate: 0.03
    min_child_samples: 80
    reg_alpha: 0.3
    reg_lambda: 2.0
    subsample: 0.75
    subsample_freq: 1
    colsample_bytree: 0.75
    early_stopping_rounds: 20
    num_threads: 1
    deterministic: true
    force_col_wise: true
    seed: 20260430
    feature_fraction_seed: 20260430
    bagging_seed: 20260430
    data_random_seed: 20260430
    verbose: -1
view_fusion:
  kind: noop_adjusted_return
  enabled: false
  return_column: expected_relative_net_return_10d
risk_model:
  kind: statistical_factor
  lookback_days: 120
  n_factors: 6
  shrinkage: 0.30
  idiosyncratic_floor: 1.0e-8
optimizer:
  kind: opportunity_pool_optimizer
allocation:
  kind: opportunity_pool_optimizer
  score_column: expected_relative_net_return_10d
  allow_gross_underfill: true
  min_allocatable_score: 0.0
  cash_fallback:
    enabled: true
  layer_exposure_groups:
    core: broad_beta
    industry: sector
    style: style_factor
    stock_satellite: stock_alpha
  exposure_groups:
    broad_beta:
      max_weight: 0.65
      score_multiplier: 1.0
    sector:
      max_weight: 0.55
      score_multiplier: 1.0
    style_factor:
      max_weight: 0.35
      score_multiplier: 1.0
    defensive_cash:
      max_weight: 0.50
      score_multiplier: 0.8
    cross_border:
      max_weight: 0.25
      score_multiplier: 0.8
    commodity:
      max_weight: 0.20
      score_multiplier: 0.8
    stock_alpha:
      max_weight: 0.0
      score_multiplier: 0.0
